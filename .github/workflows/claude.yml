name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            
            Review this pull request following the guidelines in the REVIEW.md file in the root of this repository.
            You can find general information about the project and its code in the CLAUDE.md file in the root of this repository.
            
            How to share your feedback:
            
            1.  Start a review: Use `mcp__github__create_pending_pull_request_review` to start a pending review.
            2.  Get diff information: Use `mcp__github__get_pull_request_diff` to see the code changes and line numbers.
                - If the pull request has many changes, paginate the diff using the `page` and `per_page` parameters.
                - Example: To get the first 100 lines, call `mcp__github__get_pull_request_diff` with `per_page=100` and `page=1`. For the next 100 lines, use `page=2`, and so on.
                - Continue fetching pages until all changes are retrieved.
            3.  Provide detailed feedback using inline comments for specific issues: 
                Use `mcp__github__add_comment_to_pending_review` to provide feedback on specific lines of code snippets.
                - **When suggesting code changes, format them as GitHub suggestion blocks so they can be committed directly:**
                  - For single-line suggestions, use:
                    ```suggestion
                    suggested code here
                    ```
                  - For multi-line suggestions, use:
                    ```suggestion:-0+1
                    suggested code here
                    ```
                    (Adjust the numbers to match how many lines to remove and add)
                - Use suggestion blocks liberally to make it easy for developers to apply fixes. But only when you have a concrete, actionable fix
                - Include explanation text before or after the suggestion block
            4.  Bundle general observations and praise in the general, top-level review comment
            5.  Submit for review: Use `mcp__github__submit_pending_pull_request_review` with the event type set to "COMMENT" (not "REQUEST_CHANGES") to publish all comments for non-blocking review.
          claude_args: |
            --allowedTools "mcp__github__get_pull_request,mcp__github__create_pending_pull_request_review,mcp__github__add_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__get_pull_request_diff"
